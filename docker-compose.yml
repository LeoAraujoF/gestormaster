version: '3.8'

services:
  # -----------------------------------------------------
  # 1. GESTOR APP (SaaS Principal)
  # -----------------------------------------------------
  gestor-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gestor-app:latest
    container_name: gestor_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-sua_chave_global_aqui}
      - REDIS_HOST=redis-queue
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - .env.local
    depends_on:
      - redis-queue
    networks:
      - gestor-network

  # -----------------------------------------------------
  # 2. REDIS (Para filas BullMQ do Gestor)
  # -----------------------------------------------------
  redis-queue:
    image: redis:7-alpine
    container_name: redis_queue
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-senha_segura_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_queue_data:/data
    networks:
      - gestor-network

  # -----------------------------------------------------
  # 3. EVOLUTION API (Motor do WhatsApp)
  # -----------------------------------------------------
  evolution-api:
    image: atendai/evolution-api:v2.2.1
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_EXTERNAL_URL:-http://localhost:8080}
      - AUTH_TYPE=apikey
      - AUTH_API_KEY=${EVOLUTION_API_KEY:-sua_chave_global_aqui}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:${EVOLUTION_DB_PASS:-senha_segura_pg}@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD:-senha_segura_redis}@redis-queue:6379/1 # Usa o DB 1 do Redis
      - CACHE_REDIS_PREFIX_KEY=evocache
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=true
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution-db
      - redis-queue
    networks:
      - gestor-network

  # -----------------------------------------------------
  # 4. POSTGRESQL (Banco exclusivo para Evolution API)
  # -----------------------------------------------------
  evolution-db:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${EVOLUTION_DB_PASS:-senha_segura_pg}
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - gestor-network

volumes:
  redis_queue_data:
  evolution_instances:
  evolution_db_data:

networks:
  gestor-network:
    driver: bridge
