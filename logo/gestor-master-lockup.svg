<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" role="img" aria-label="Gestor Master">
  <!-- Assinatura horizontal: símbolo + wordmark serifada + rubrica mono.
       Obs.: a fonte é importada via CSS — renderiza no navegador; para uso em
       app/impressão, prefira o texto convertido em curvas na apresentação. -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,560&amp;family=IBM+Plex+Mono:wght@500&amp;display=swap');
    .word{font:560 34px "Fraunces",Georgia,serif;letter-spacing:-0.02em;fill:#171610}
    .rub{font:500 9.5px "IBM Plex Mono",monospace;letter-spacing:0.22em;fill:#8b887b}
  </style>
  <g transform="translate(4,10) scale(0.79)">
    <path d="M 66.5 24.4 A 30 30 0 1 0 77.1 55.3"
          fill="none" stroke="#171610" stroke-width="12" stroke-linecap="round"/>
    <path d="M 44 54 L 55 65 L 76 40"
          fill="none" stroke="#1e6b47" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="word" x="94" y="56">Gestor Master</text>
  <text class="rub"  x="96" y="76">COBRANÇA CONFIRMADA · NO AUTOMÁTICO</text>
</svg>
